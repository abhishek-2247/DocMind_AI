{% extends "base.html" %}
{% block title %}Login — DocMind AI{% endblock %}
{% block auth_content %}
<div class="auth-page d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card glass-card p-5">
    <div class="text-center mb-4">
      <div class="auth-logo mb-3">
        <i class="bi bi-cpu-fill text-accent" style="font-size:2.5rem"></i>
      </div>
      <h2 class="fw-bold mb-1">DocMind <span class="text-accent">AI</span></h2>
      <p class="text-muted small">Sign in to your knowledge workspace</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="email">Email address</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-transparent"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required/>
          <button class="btn btn-outline-secondary" type="button" id="togglePwd">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="remember" name="remember"/>
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>
    <hr class="my-4"/>
    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="text-accent fw-semibold">Create one free</a>
    </p>
  </div>
</div>
<script>
  document.getElementById('togglePwd').addEventListener('click', function(){
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if(inp.type==='password'){inp.type='text';icon.className='bi bi-eye-slash';}
    else{inp.type='password';icon.className='bi bi-eye';}
  });
</script>
{% endblock %}
