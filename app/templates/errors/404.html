{% extends "base.html" %}
{% block title %}Page Not Found — DocMind AI{% endblock %}
{% block page_title %}{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 60px)">
  <div class="text-center px-4">
    <div style="font-size:5rem;font-weight:800;color:var(--border);line-height:1">404</div>
    <h3 class="fw-bold mt-2 mb-2">Page not found</h3>
    <p class="text-muted mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
      <i class="bi bi-house me-2"></i>Go to Dashboard
    </a>
  </div>
</div>
{% endblock %}
