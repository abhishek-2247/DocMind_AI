{% extends "base.html" %}
{% block title %}Server Error — DocMind AI{% endblock %}
{% block page_title %}{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 60px)">
  <div class="text-center px-4">
    <div style="font-size:5rem;font-weight:800;color:var(--border);line-height:1">500</div>
    <h3 class="fw-bold mt-2 mb-2">Something went wrong</h3>
    <p class="text-muted mb-4">An unexpected error occurred on our end. Please try again in a moment.</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
      <i class="bi bi-arrow-clockwise me-2"></i>Try Again
    </a>
  </div>
</div>
{% endblock %}
