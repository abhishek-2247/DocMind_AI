{% extends "base.html" %}
{% block title %}Too Many Requests — DocMind AI{% endblock %}
{% block page_title %}{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 60px)">
  <div class="text-center px-4">
    <div style="font-size:5rem;font-weight:800;color:var(--border);line-height:1">429</div>
    <h3 class="fw-bold mt-2 mb-2">Slow down</h3>
    <p class="text-muted mb-4">You've made too many requests in a short time. Please wait a moment before trying again.</p>
    <a href="{{ url_for('misc.landing') }}" class="btn btn-primary">
      <i class="bi bi-house me-2"></i>Back to Home
    </a>
  </div>
</div>
{% endblock %}
